name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yiminger/ymicp:${{ steps.extract_version.outputs.VERSION }}
            yiminger/ymicp:latest

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build with Nuitka
        run: |
          yes | python -m nuitka --standalone --onefile \
            --include-data-files="templates/*=templates/" \
            --include-data-files="static/js/*=static/js/" \
            --include-data-files="static/css/*=static/css/" \
            --include-data-files="static/fonts/*=static/fonts/" \
            icpApi.py

      - name: Package
        run: |
          mkdir -p release
          cp icpApi.bin release/icpApi
          chmod +x release/icpApi
          cd release && tar -czf ../ymicp-linux-amd64.tar.gz icpApi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ymicp-linux-amd64
          path: ymicp-linux-amd64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Download Dependency Walker
        shell: pwsh
        run: |
          $cacheDir = "$env:LOCALAPPDATA\Nuitka\Nuitka\Cache\downloads\depends\x86_64"
          New-Item -ItemType Directory -Force -Path $cacheDir
          Invoke-WebRequest -Uri "https://dependencywalker.com/depends22_x64.zip" -OutFile "$cacheDir\depends22_x64.zip"
          Expand-Archive -Path "$cacheDir\depends22_x64.zip" -DestinationPath $cacheDir -Force

      - name: Build with Nuitka
        shell: cmd
        run: |
          echo Yes | python -m nuitka --standalone --onefile --include-data-files="templates/*=templates/" --include-data-files="static/js/*=static/js/" --include-data-files="static/css/*=static/css/" --include-data-files="static/fonts/*=static/fonts/" icpApi.py

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item icpApi.exe -Destination release\
          Compress-Archive -Path release\icpApi.exe -DestinationPath ymicp-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ymicp-windows-amd64
          path: ymicp-windows-amd64.zip

  release:
    name: Create GitHub Release
    needs: [build-docker, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_version.outputs.VERSION }}
          name: ICP_Query ${{ steps.extract_version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
